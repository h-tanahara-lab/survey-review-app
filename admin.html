<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>オーナー管理画面</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic ProN', sans-serif;
  background: linear-gradient(180deg, #F7F3EF 0%, #F0ECE6 100%);
  min-height: 100vh;
}

/* Login */
.login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.login-card { background: #FFF; border-radius: 24px; padding: 40px 32px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); width: 100%; max-width: 400px; }
.login-logo { text-align: center; margin-bottom: 24px; }
.login-logo span { font-size: 40px; }
.login-title { text-align: center; font-size: 20px; font-weight: 700; color: #3A332D; margin-bottom: 8px; }
.login-sub { text-align: center; font-size: 13px; color: #B0A69C; margin-bottom: 24px; }
.input-group { margin-bottom: 16px; }
.input-group label { display: block; font-size: 13px; font-weight: 600; color: #6B5B4E; margin-bottom: 6px; }
.input-group input { width: 100%; padding: 12px 16px; border: 2px solid #E8DDD5; border-radius: 12px; font-size: 15px; font-family: inherit; outline: none; transition: border-color 0.2s; }
.input-group input:focus { border-color: #D4847C; }
.btn-login { width: 100%; padding: 14px; border: none; border-radius: 12px; background: linear-gradient(135deg, #D4847C, #E8A87C); color: #FFF; font-size: 16px; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 8px; }
.btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
.login-error { background: rgba(212,132,124,0.1); border: 1px solid #D4847C; border-radius: 8px; padding: 10px; font-size: 13px; color: #D4847C; text-align: center; margin-top: 12px; }

/* Header */
.header { background: #FFF; border-bottom: 1px solid #E8E2DC; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
.header-left { display: flex; align-items: center; gap: 12px; }
.header-icon { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, #D4847C, #E8A87C); display: flex; align-items: center; justify-content: center; font-size: 18px; }
.header-name { font-size: 15px; font-weight: 700; color: #3A332D; }
.header-sub { font-size: 11px; color: #B0A69C; }
.btn-logout { background: none; border: 1px solid #E8DDD5; border-radius: 8px; padding: 6px 14px; font-size: 12px; color: #8C8279; cursor: pointer; font-family: inherit; }

/* Layout */
.layout { display: flex; min-height: calc(100vh - 69px); }
nav { width: 220px; background: #FFF; border-right: 1px solid #E8E2DC; padding: 20px 0; flex-shrink: 0; }
.nav-btn { display: flex; align-items: center; gap: 10px; width: 100%; padding: 12px 20px; border: none; cursor: pointer; background: transparent; border-left: 3px solid transparent; color: #8C8279; font-weight: 400; font-size: 14px; font-family: inherit; transition: all 0.15s; }
.nav-btn.active { background: linear-gradient(90deg, rgba(212,132,124,0.08), transparent); border-left-color: #D4847C; color: #D4847C; font-weight: 700; }
main { flex: 1; padding: 24px 32px; max-width: 960px; overflow: auto; }

/* Cards */
.card { background: #FFF; border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); margin-bottom: 16px; }
.stat-row { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
.stat-card { background: #FFF; border-radius: 16px; padding: 20px 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); flex: 1 1 0; min-width: 140px; }
.stat-icon { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.stat-icon span:first-child { font-size: 20px; }
.stat-label { font-size: 12px; color: #8C8279; font-weight: 500; }
.stat-value { font-size: 28px; font-weight: 800; color: #3A332D; letter-spacing: -0.5px; }
.stat-value.accent { color: #E8A87C; }
.stat-value.green { color: #7BC67E; }
.stat-sub { font-size: 12px; color: #B0A69C; margin-top: 2px; }

.section-title { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
.section-title span { font-size: 18px; }
.section-title h3 { font-size: 16px; font-weight: 700; color: #3A332D; }

.page-title { font-size: 22px; font-weight: 800; color: #3A332D; margin-bottom: 4px; }
.page-sub { font-size: 13px; color: #B0A69C; margin-bottom: 24px; }

/* Table */
.tbl-header { display: flex; align-items: center; gap: 16px; padding: 10px 0 14px; border-bottom: 2px solid #F0ECE6; font-size: 12px; font-weight: 700; color: #8C8279; }
.tbl-row { display: flex; align-items: center; gap: 16px; padding: 14px 0; border-bottom: 1px solid #F5F0EB; cursor: pointer; transition: background 0.1s; }
.tbl-row:hover { background: #FDFBF9; }
.badge { font-size: 11px; padding: 3px 10px; border-radius: 12px; font-weight: 600; }
.badge-yes { background: rgba(123,198,126,0.12); color: #5BAF5E; }
.badge-no { background: rgba(212,132,124,0.08); color: #B0A69C; }

/* Filter */
.filters { display: flex; gap: 8px; flex-wrap: wrap; }
.filter-btn { padding: 6px 14px; border-radius: 8px; border: 1px solid #E8E2DC; background: #FFF; color: #8C8279; font-size: 12px; font-weight: 600; cursor: pointer; font-family: inherit; }
.filter-btn.active { border-color: #D4847C; background: linear-gradient(135deg, #D4847C, #E8A87C); color: #FFF; }

/* Detail */
.detail-section { margin-bottom: 16px; }
.detail-label { font-size: 12px; color: #8C8279; font-weight: 600; margin-bottom: 4px; }
.detail-chips { display: flex; gap: 6px; flex-wrap: wrap; }
.detail-chip { padding: 6px 14px; border-radius: 20px; font-size: 13px; }
.detail-chip.good { background: rgba(123,198,126,0.1); color: #5BAF5E; }
.detail-chip.improve { background: rgba(212,132,124,0.08); color: #D4847C; }
.detail-chip.neutral { background: #F5F0EB; color: #6B5B4E; }
.review-box { padding: 16px; background: #FFFBF7; border-radius: 12px; border: 1px solid #F0E8DF; }
.review-label { font-size: 12px; color: #D4847C; font-weight: 700; margin-bottom: 8px; }
.review-text { font-size: 14px; color: #3A332D; line-height: 1.7; }

.back-btn { background: none; border: none; color: #D4847C; font-size: 14px; cursor: pointer; font-family: inherit; font-weight: 600; margin-bottom: 16px; padding: 0; }

/* Ranking */
.rank-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; border-bottom: 1px solid #F5F0EB; }
.rank-num { width: 22px; height: 22px; border-radius: 50%; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.rank-top { background: linear-gradient(135deg, #D4847C, #E8A87C); color: #FFF; }
.rank-other { background: #F0ECE6; color: #8C8279; }
.rank-bar { height: 6px; border-radius: 3px; }

/* Loading */
.loading { text-align: center; padding: 60px 20px; color: #B0A69C; font-size: 15px; }

/* Responsive */
@media (max-width: 768px) {
  nav { display: none; }
  main { padding: 16px; }
  .stat-row { flex-direction: column; }
}
</style>
</head>
<body>
<div id="app"></div>

<script>
// ===== Supabase設定 =====
const SUPABASE_URL = "https://krjgthuwecuwlcfsgjmd.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtyamd0aHV3ZWN1d2xjZnNnam1kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxNDg4ODEsImV4cCI6MjA4OTcyNDg4MX0.aQLzcIzdcRUSNi2vcJttHcSm1AQ6eB03tkFdl7_1zTQ";

const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const INDUSTRY_LABELS = {
  nail_salon: "ネイルサロン",
  hair_salon: "美容室",
  esthetic: "エステサロン",
  eyelash: "まつエクサロン",
  relaxation: "リラクゼーション・整体",
  restaurant: "飲食店",
  hotel: "ホテル・宿泊施設",
  clinic: "クリニック・治療院",
  other: "その他",
};

const MENU_LABELS = {
  nail_salon: "施術メニュー", hair_salon: "施術メニュー", esthetic: "施術メニュー",
  eyelash: "施術メニュー", relaxation: "施術メニュー",
  restaurant: "お品書き", hotel: "お部屋タイプ", clinic: "施術・診療メニュー", other: "サービス内容",
};

// ===== 状態 =====
const state = {
  screen: "login", // login | dashboard
  user: null,
  shop: null,
  responses: [],
  staffMembers: [],
  surveyMenus: [],
  surveyGoodPoints: [],
  surveyImprovePoints: [],
  activeNav: "dashboard",
  selectedResponse: null,
  filterRating: "all",
  loading: false,
  loginError: "",
  email: "",
  password: "",
};

// ===== データ取得 =====
async function fetchShopData() {
  const { data: shops } = await sbClient.from("shops").select("*").eq("owner_email", state.email).eq("status", "use");
  if (!shops || shops.length === 0) return null;
  state.shop = shops[0];

  const { data: responses } = await sbClient.from("responses").select("*").eq("shop_id", state.shop.id).order("created_at", { ascending: false });
  state.responses = responses || [];

  // スタッフ取得
  const { data: staff } = await sbClient.from("staff_members").select("*").eq("shop_id", state.shop.id).order("sort_order");
  state.staffMembers = staff || [];

  // テンプレート取得
  const { data: templates } = await sbClient.from("survey_templates").select("*").eq("industry_type", state.shop.industry_type);
  if (templates) {
    templates.forEach(t => {
      const opts = typeof t.options === "string" ? JSON.parse(t.options) : t.options;
      if (t.question_key === "menus") state.surveyMenus = opts;
      else if (t.question_key === "good_points") state.surveyGoodPoints = opts;
      else if (t.question_key === "improve_points") state.surveyImprovePoints = opts;
    });
  }

  // 店舗別カスタム設定で上書き
  const { data: custom } = await sbClient.from("survey_settings").select("*").eq("shop_id", state.shop.id);
  if (custom) {
    custom.forEach(c => {
      const opts = typeof c.custom_options === "string" ? JSON.parse(c.custom_options) : c.custom_options;
      if (c.question_key === "menus") state.surveyMenus = opts;
      else if (c.question_key === "good_points") state.surveyGoodPoints = opts;
      else if (c.question_key === "improve_points") state.surveyImprovePoints = opts;
    });
  }

  return state.shop;
}

// ===== 統計計算 =====
function calcStats() {
  const r = state.responses;
  const now = new Date();
  const thisMonth = r.filter(x => new Date(x.created_at).getMonth() === now.getMonth() && new Date(x.created_at).getFullYear() === now.getFullYear());
  const total = thisMonth.length;
  const consents = thisMonth.filter(x => x.consent_given).length;
  const avgRating = total > 0 ? (thisMonth.reduce((s, x) => s + x.rating, 0) / total).toFixed(1) : "0";
  const rate = total > 0 ? ((consents / total) * 100).toFixed(1) : "0";
  return { total, consents, avgRating, rate };
}

function calcGoodPointsRanking() {
  const counts = {};
  state.responses.filter(r => r.is_positive).forEach(r => {
    (r.good_points || []).forEach(p => { counts[p] = (counts[p] || 0) + 1; });
  });
  return Object.entries(counts).sort((a, b) => b[1] - a[1]).map(([label, count]) => ({ label, count }));
}

function calcImprovePointsRanking() {
  const counts = {};
  state.responses.filter(r => !r.is_positive).forEach(r => {
    (r.improve_points || []).forEach(p => { counts[p] = (counts[p] || 0) + 1; });
  });
  return Object.entries(counts).sort((a, b) => b[1] - a[1]).map(([label, count]) => ({ label, count }));
}

// ===== ログイン（簡易版: メアドでshop検索） =====
async function handleLogin() {
  state.loginError = "";
  state.loading = true;
  render();

  try {
    const shop = await fetchShopData();
    if (!shop) {
      state.loginError = "このメールアドレスに紐づく店舗が見つかりません";
      state.loading = false;
      render();
      return;
    }
    state.screen = "dashboard";
    state.loading = false;
    render();
  } catch (e) {
    state.loginError = "ログインに失敗しました: " + e.message;
    state.loading = false;
    render();
  }
}

function handleLogout() {
  state.screen = "login";
  state.user = null;
  state.shop = null;
  state.responses = [];
  state.email = "";
  state.password = "";
  state.activeNav = "dashboard";
  state.selectedResponse = null;
  render();
}

// ===== 日付フォーマット =====
function fmtDate(d) {
  const dt = new Date(d);
  return `${dt.getMonth() + 1}/${dt.getDate()}`;
}
function fmtDateTime(d) {
  const dt = new Date(d);
  return `${dt.getFullYear()}/${dt.getMonth() + 1}/${dt.getDate()} ${dt.getHours()}:${String(dt.getMinutes()).padStart(2, "0")}`;
}
function stars(n) { return "★".repeat(n) + "☆".repeat(5 - n); }

// ===== レンダリング =====
function render() {
  const app = document.getElementById("app");
  if (state.screen === "login") { renderLogin(app); return; }
  renderDashboard(app);
}

function renderLogin(app) {
  app.innerHTML = `
    <div class="login-wrap">
      <div class="login-card">
        <div class="login-logo"><span>💅</span></div>
        <div class="login-title">オーナー管理画面</div>
        <div class="login-sub">登録メールアドレスでログイン</div>
        <div class="input-group">
          <label>メールアドレス</label>
          <input type="email" id="login-email" value="${state.email}" placeholder="owner@example.com" onkeydown="if(event.key==='Enter')document.getElementById('login-btn').click()">
        </div>
        <div class="input-group">
          <label>パスワード</label>
          <input type="password" id="login-pw" value="${state.password}" placeholder="パスワード" onkeydown="if(event.key==='Enter')document.getElementById('login-btn').click()">
        </div>
        <button class="btn-login" id="login-btn" onclick="doLogin()" ${state.loading ? "disabled" : ""}>
          ${state.loading ? "ログイン中..." : "ログイン"}
        </button>
        ${state.loginError ? `<div class="login-error">${state.loginError}</div>` : ""}
      </div>
    </div>`;
}

function renderDashboard(app) {
  const navItems = [
    { id: "dashboard", label: "ダッシュボード", icon: "📊" },
    { id: "responses", label: "回答一覧", icon: "📋" },
    { id: "survey", label: "アンケート設定", icon: "⚙️" },
    { id: "shop", label: "店舗設定", icon: "🏪" },
  ];

  const navHTML = navItems.map(n => `
    <button class="nav-btn ${state.activeNav === n.id ? 'active' : ''}" onclick="setNav('${n.id}')">
      <span>${n.icon}</span>${n.label}
    </button>`).join("");

  let mainHTML = "";
  if (state.activeNav === "dashboard") mainHTML = renderDashboardContent();
  else if (state.activeNav === "responses" && !state.selectedResponse) mainHTML = renderResponsesList();
  else if (state.activeNav === "responses" && state.selectedResponse) mainHTML = renderResponseDetail();
  else if (state.activeNav === "shop") mainHTML = renderShopSettings();
  else if (state.activeNav === "survey") mainHTML = renderSurveySettings();

  app.innerHTML = `
    <div class="header">
      <div class="header-left">
        <div class="header-icon">💅</div>
        <div>
          <div class="header-name">${state.shop ? state.shop.name : ""}</div>
          <div class="header-sub">管理画面</div>
        </div>
      </div>
      <button class="btn-logout" onclick="handleLogout()">ログアウト</button>
    </div>
    <div class="layout">
      <nav>${navHTML}</nav>
      <main>${mainHTML}</main>
    </div>`;
}

function renderDashboardContent() {
  const stats = calcStats();
  const goodRanking = calcGoodPointsRanking();
  const improveRanking = calcImprovePointsRanking();
  const recent = state.responses.slice(0, 5);

  const maxGood = goodRanking.length > 0 ? goodRanking[0].count : 1;

  return `
    <h2 class="page-title">ダッシュボード</h2>
    <p class="page-sub">${state.shop ? state.shop.name : ""} のサマリー（今月）</p>

    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-icon"><span>📝</span><span class="stat-label">回答数</span></div>
        <div class="stat-value">${stats.total}</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><span>⭐</span><span class="stat-label">平均満足度</span></div>
        <div class="stat-value accent">${stats.avgRating}</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><span>✅</span><span class="stat-label">口コミ同意数</span></div>
        <div class="stat-value">${stats.consents}</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon"><span>📈</span><span class="stat-label">同意率</span></div>
        <div class="stat-value green">${stats.rate}%</div>
      </div>
    </div>

    <div class="card">
      <div class="section-title"><span>👍</span><h3>良かった点ランキング</h3></div>
      ${goodRanking.length === 0 ? '<p style="color:#B0A69C;font-size:14px">まだデータがありません</p>' :
        goodRanking.map((item, i) => `
          <div class="rank-row">
            <span class="rank-num ${i < 3 ? 'rank-top' : 'rank-other'}">${i + 1}</span>
            <span style="flex:1;font-size:13px;color:#3A332D">${item.label}</span>
            <div style="display:flex;align-items:center;gap:6px">
              <div class="rank-bar" style="width:${Math.round((item.count / maxGood) * 80)}px;background:${i < 3 ? 'linear-gradient(90deg,#D4847C,#E8A87C)' : '#E8E2DC'}"></div>
              <span style="font-size:12px;color:#8C8279;font-weight:600;min-width:24px;text-align:right">${item.count}</span>
            </div>
          </div>`).join("")}
      ${improveRanking.length > 0 ? `
        <div style="margin-top:20px;padding-top:16px;border-top:2px solid #F5F0EB">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
            <span style="font-size:14px">💡</span>
            <span style="font-size:14px;font-weight:700;color:#3A332D">改善してほしい点</span>
          </div>
          ${improveRanking.map(item => `
            <div style="display:flex;align-items:center;gap:12px;padding:6px 0">
              <span style="flex:1;font-size:13px;color:#6B5B4E">${item.label}</span>
              <span style="font-size:12px;color:#D4847C;font-weight:600">${item.count}</span>
            </div>`).join("")}
        </div>` : ""}
    </div>

    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div class="section-title" style="margin-bottom:0"><span>🕐</span><h3>直近の回答</h3></div>
        <button onclick="setNav('responses')" style="background:none;border:1px solid #E8E2DC;border-radius:8px;padding:6px 14px;font-size:12px;color:#D4847C;cursor:pointer;font-weight:600;font-family:inherit">すべて見る →</button>
      </div>
      ${recent.length === 0 ? '<p style="color:#B0A69C;font-size:14px">まだ回答がありません</p>' :
        recent.map((r, i) => `
          <div class="tbl-row" onclick="viewResponse('${r.id}')" style="border-bottom:${i < recent.length - 1 ? '1px solid #F5F0EB' : 'none'}">
            <div style="width:50px;font-size:12px;color:#B0A69C">${fmtDate(r.created_at)}</div>
            <div style="width:90px;font-size:14px">${stars(r.rating)}</div>
            <div style="flex:1;font-size:13px;color:#3A332D">${(r.menu_selections || []).join(", ")}</div>
            <span class="badge ${r.consent_given ? 'badge-yes' : 'badge-no'}">${r.consent_given ? "同意済" : "未同意"}</span>
          </div>`).join("")}
    </div>`;
}

function renderResponsesList() {
  const filtered = state.filterRating === "all" ? state.responses : state.responses.filter(r => r.rating === parseInt(state.filterRating));

  return `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px">
      <div>
        <h2 class="page-title">回答一覧</h2>
        <p style="font-size:13px;color:#B0A69C;margin:0">全${state.responses.length}件</p>
      </div>
      <div class="filters">
        ${["all", "5", "4", "3", "2", "1"].map(f => `
          <button class="filter-btn ${state.filterRating === f ? 'active' : ''}" onclick="setFilter('${f}')">
            ${f === "all" ? "すべて" : "★" + f}
          </button>`).join("")}
      </div>
    </div>
    <div class="card">
      <div class="tbl-header">
        <div style="width:70px">日時</div>
        <div style="width:90px">評価</div>
        <div style="flex:1">メニュー</div>
        <div style="width:60px;text-align:center">同意</div>
        <div style="width:50px"></div>
      </div>
      ${filtered.length === 0 ? '<p style="padding:20px 0;color:#B0A69C;font-size:14px;text-align:center">該当する回答がありません</p>' :
        filtered.map((r, i) => `
          <div class="tbl-row" onclick="viewResponse('${r.id}')">

// スタッフ追加
async function addStaff() {
  const input = document.getElementById("new-staff-name");
  const name = input.value.trim();
  if (!name) return;
  const { error } = await sbClient.from("staff_members").insert([{ shop_id: state.shop.id, name, is_active: true, sort_order: state.staffMembers.length }]);
  if (error) { document.getElementById("staff-msg").innerHTML = '<span style="color:#D4847C;font-size:12px">追加に失敗しました</span>'; return; }
  input.value = "";
  await refreshSurveyData();
  render();
}

// スタッフ削除（論理削除）
async function removeStaff(id) {
  await sbClient.from("staff_members").update({ is_active: false }).eq("id", id);
  await refreshSurveyData();
  render();
}

// survey_settingsにカスタム設定を保存（upsert）
async function saveSurveySetting(questionKey, options) {
  const { data: existing } = await sbClient.from("survey_settings").select("id").eq("shop_id", state.shop.id).eq("question_key", questionKey);
  if (existing && existing.length > 0) {
    await sbClient.from("survey_settings").update({ custom_options: JSON.stringify(options) }).eq("id", existing[0].id);
  } else {
    await sbClient.from("survey_settings").insert([{ shop_id: state.shop.id, question_key: questionKey, custom_options: JSON.stringify(options) }]);
  }
}

}

// QRコード生成（ページ遷移後に呼ぶ）
function generateQR() {
  const canvas = document.getElementById("qr-canvas");
  if (!canvas || !state.shop) return;
  const url = `https://greview.cvmcms.com/?shop=${state.shop.id}`;

  // QRCode ライブラリが使える場合
  if (typeof QRCode !== "undefined" && QRCode.toCanvas) {
    QRCode.toCanvas(canvas, url, { width: 200, margin: 2, color: { dark: "#3A332D", light: "#FFFFFF" } }, function(err) {
      if (err) { console.error("QR生成エラー:", err); showQRFallback(url); }
    });
  } else {
    showQRFallback(url);
  }
}

// フォールバック: img要素でQRコード表示
function showQRFallback(url) {
  const canvas = document.getElementById("qr-canvas");
  if (!canvas) return;
  const encoded = encodeURIComponent(url);
  const imgUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encoded}`;
  const container = canvas.parentElement;
  canvas.style.display = "none";
  const existing = document.getElementById("qr-fallback-img");
  if (existing) existing.remove();
  const img = document.createElement("img");
  img.id = "qr-fallback-img";
  img.src = imgUrl;
  img.width = 200;
  img.height = 200;
  img.style.borderRadius = "12px";
  img.style.border = "1px solid #E8DDD5";
  container.insertBefore(img, canvas.nextSibling);
}

// QRコードダウンロード
function downloadQR(format) {
  const url = `https://greview.cvmcms.com/?shop=${state.shop.id}`;
  const shopName = state.shop.name.replace(/\s+/g, "_");

  if (typeof QRCode !== "undefined" && QRCode.toDataURL) {
    if (format === "png") {
      QRCode.toDataURL(url, { width: 400, margin: 2, color: { dark: "#3A332D", light: "#FFFFFF" } }, (err, dataUrl) => {
        if (err) { downloadQRFallback(url, shopName); return; }
        const a = document.createElement("a");
        a.href = dataUrl;
        a.download = `${shopName}_QR.png`;
        a.click();
      });
    } else {
      QRCode.toString(url, { type: "svg", width: 400, margin: 2, color: { dark: "#3A332D", light: "#FFFFFF" } }, (err, svgStr) => {
        if (err) { downloadQRFallback(url, shopName); return; }
        const blob = new Blob([svgStr], { type: "image/svg+xml" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `${shopName}_QR.svg`;
        a.click();
      });
    }
  } else {
    downloadQRFallback(url, shopName);
  }
}

function downloadQRFallback(url, shopName) {
  const encoded = encodeURIComponent(url);
  const imgUrl = `https://api.qrserver.com/v1/create-qr-code/?size=400x400&format=png&data=${encoded}`;
  fetch(imgUrl)
    .then(res => res.blob())
    .then(blob => {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `${shopName}_QR.png`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    })
    .catch(() => {
      // fetchが失敗した場合は別タブで開く
      window.open(imgUrl, "_blank");
    });
}
